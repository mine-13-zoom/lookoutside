name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        run: node scripts/stage-binary.mjs --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: npm/bin/lookoutside-*
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for --provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing requires npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      - name: Download all staged binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: npm/bin
          merge-multiple: true

      - name: Verify staged binaries
        run: ls -l npm/bin/

      # --ignore-scripts skips the "prepack" cargo build; binaries are already
      # staged for every platform by the build jobs. Authentication happens via
      # OIDC trusted publishing (id-token: write above) — no NPM_TOKEN needed.
      - name: Publish
        run: npm publish --ignore-scripts --provenance --access public
